<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - Submit Post</title>
</head>
<body>

    <h2>Submit a Post</h2>
    
    <textarea id="postContent" placeholder="Write your AI idea here..." rows="4" cols="50"></textarea>
    <button id="submitBtn" disabled>Submit Post</button> <!-- 🔴 Disabled until SDK loads -->
    
    <p id="status"></p>

    <!-- ✅ Load Fleek SDK from Fleek Storage -->
    <script>
        const sdkUrl = "https://bafkreig4d334pnpgjxq7vju336w4aq5ebczqxuuvw3wum5fhowgdz5kc4u.ipfs.flk-ipfs.xyz";

        function loadFleekSDK() {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = sdkUrl;
                script.onload = () => {
                    console.log("✅ Fleek SDK Loaded Successfully!");
                    resolve();
                };
                script.onerror = () => {
                    console.error("❌ Failed to load Fleek SDK!");
                    document.getElementById("status").textContent = "❌ Fleek SDK failed to load!";
                    reject(new Error("Failed to load Fleek SDK"));
                };
                document.body.appendChild(script);
            });
        }

        async function initializeFleek() {
            try {
                document.getElementById("status").textContent = "🚀 Loading Fleek SDK...";
                await loadFleekSDK();

                // ✅ Ensure Fleek SDK is available
                if (!window.FleekSdk || !window.ApplicationAccessTokenService) {
                    throw new Error("❌ Fleek SDK failed to load.");
                }

                console.log("✅ Fleek SDK Initialized!");

                // ✅ Authenticate using ApplicationAccessTokenService
                const accessTokenService = new window.ApplicationAccessTokenService({
                    clientId: "client_x1KWJx5pkupr-QO0F0Cp", // ✅ Use your correct Application Credential ID
                });

                const fleekSdk = new window.FleekSdk({
                    accessTokenService,
                });

                document.getElementById("status").textContent = "✅ Fleek SDK Ready!";
                document.getElementById("submitBtn").disabled = false; // ✅ Enable Submit Button

                document.getElementById("submitBtn").addEventListener("click", async function () {
                    const postContent = document.getElementById("postContent").value.trim();
                    if (!postContent) {
                        alert("Please write something before submitting!");
                        return;
                    }

                    console.log("📤 Preparing to upload post...");

                    // ✅ Convert text into a Blob for Fleek SDK
                    const blob = new Blob([postContent], { type: "text/plain" });
                    const fileLike = {
                        name: `post-${Date.now()}.txt`,
                        stream: () => blob.stream(),
                    };

                    try {
                        document.getElementById("status").textContent = "🚀 Uploading your post to Fleek...";
                        
                        // ✅ Upload text file to Fleek Storage
                        console.log("🔄 Uploading file to Fleek Storage...");
                        const result = await fleekSdk.storage().uploadFile({
                            file: fileLike,
                        });

                        console.log("✅ Post uploaded successfully!", result);

                        // ✅ Show CID and link to the uploaded post
                        document.getElementById("status").innerHTML = `
                            ✅ Post Uploaded!<br>
                            CID: ${result.pin.cid} <br>
                            <a href="https://${result.pin.cid}.ipfs.fleek.xyz" target="_blank">View Post</a>
                        `;
                    } catch (error) {
                        console.error("❌ Upload failed:", error);
                        document.getElementById("status").textContent = `❌ Upload failed! ${error.message}`;
                    }
                });

            } catch (error) {
                console.error(error);
                document.getElementById("status").textContent = error.message;
            }
        }

        // ✅ Initialize Fleek SDK when page loads
        window.onload = initializeFleek;
    </script>

</body>
</html>
