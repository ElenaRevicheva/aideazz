<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIdeazz - Submit Post</title>
</head>
<body>

    <h2>Submit a Post</h2>
    
    <input type="file" id="fileInput">
    <button id="submitBtn">Submit Post</button>
    
    <p id="status"></p>

    <!-- Load the bundled Fleek SDK from GitHub -->
    <script src="https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPOSITORY/main/dist/fleek-sdk.bundle.js"></script>
    
    <script>
        async function initializeFleek() {
            // Ensure Fleek SDK is available
            if (!window.FleekSdk || !window.ApplicationAccessTokenService) {
                console.error("Fleek SDK failed to load");
                return;
            }

            // Authenticate using ApplicationAccessTokenService (browser authentication)
            const accessTokenService = new window.ApplicationAccessTokenService({
                clientId: "client_x1KWJx5pkupr-QO0F0Cp",
            });

            const fleekSdk = new window.FleekSdk({
                accessTokenService,
            });

            document.getElementById("submitBtn").addEventListener("click", async function () {
                const fileInput = document.getElementById("fileInput").files[0];
                if (!fileInput) {
                    alert("Please select a file first!");
                    return;
                }

                // Convert the file into a format compatible with Fleek SDK
                const fileLike = {
                    name: fileInput.name,
                    stream: () => fileInput.stream(),
                };

                try {
                    document.getElementById("status").textContent = "🚀 Uploading to Fleek...";
                    const result = await fleekSdk.storage.uploadFile({ file: fileLike });
                    console.log("File uploaded:", result.pin.cid);

                    document.getElementById("status").innerHTML = `✅ Upload Successful!<br>
                        CID: ${result.pin.cid} <br>
                        <a href="https://${result.pin.cid}.ipfs.fleek.xyz" target="_blank">View File</a>`;
                } catch (error) {
                    console.error("Upload failed:", error);
                    document.getElementById("status").textContent = "❌ Upload failed!";
                }
            });
        }

        // Initialize Fleek SDK once the page is loaded
        window.onload = initializeFleek;
    </script>

</body>
</html>
