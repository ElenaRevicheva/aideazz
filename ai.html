<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - AIdeazz</title>
    <script type="module">
        import { FleekSdk, ApplicationAccessTokenService } from 'https://cdn.jsdelivr.net/npm/@fleek-platform/sdk/browser.js';

        const clientId = "client__3Wvtty7Aa7KgxsqC0NO"; // Your Fleek Client ID

        async function uploadToFleek(content) {
            try {
                // Initialize the Fleek SDK
                const accessTokenService = new ApplicationAccessTokenService({
                    clientId: clientId
                });

                const fleekSdk = new FleekSdk({
                    accessTokenService
                });

                // Convert the content to a Blob
                const blob = new Blob([content], { type: "text/plain" });

                // Upload to Fleek
                const uploadResult = await fleekSdk.storage().uploadFile({
                    file: blob,
                    onUploadProgress: (progress) => console.log(`Upload Progress: ${progress}%`)
                });

                const cid = uploadResult.cid;
                document.getElementById("postStatus").innerHTML = `✅ Post uploaded! View it on <a href="https://ipfs.io/ipfs/${cid}" target="_blank">IPFS</a>`;
                
                // Display the uploaded post
                const postDiv = document.createElement("div");
                postDiv.innerHTML = `<p><a href="https://ipfs.io/ipfs/${cid}" target="_blank">${content}</a></p>`;
                document.getElementById("posts").prepend(postDiv);
            } catch (error) {
                console.error("Error uploading to Fleek", error);
                document.getElementById("postStatus").innerText = "❌ Failed to upload post.";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("submitPost").addEventListener("click", async () => {
                const postContent = document.getElementById("postContent").value;
                if (!postContent) {
                    alert("Please write something before submitting.");
                    return;
                }
                document.getElementById("postStatus").innerText = "Uploading to Fleek...";
                await uploadToFleek(postContent);
            });
        });
    </script>
