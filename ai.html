<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - AIdeazz</title>

    <!-- Import Fleek SDK from CDN -->
    <script type="module">
        import { FleekSdk, ApplicationAccessTokenService } from 'https://esm.sh/@fleek-platform/sdk/browser';

        // Fleek Credentials
        const clientId = "client__3Wvtty7Aa7KgxsqC0NO"; // Your Fleek Application Token ID
        const projectId = "<YOUR_PROJECT_ID>"; // Replace with your Fleek project ID

        console.log("🚀 Initializing Fleek SDK...");
        
        const fleekStorage = new FleekSdk({
            accessTokenService: new ApplicationAccessTokenService({ clientId })
        });

        console.log("✅ Fleek SDK Initialized:", fleekStorage);

        async function uploadToFleek(content) {
            try {
                if (!fleekStorage || !fleekStorage.storage) {
                    throw new Error("❌ Fleek SDK storage object is undefined");
                }

                console.log("🛠️ Fleek Storage Object:", fleekStorage.storage);

                if (typeof fleekStorage.storage.uploadFile !== "function") {
                    throw new Error("❌ Fleek SDK storage.uploadFile function is missing");
                }

                if (!content.trim()) {
                    throw new Error("❌ Content cannot be empty");
                }

                const blob = new Blob([content], { type: "text/plain" });
                const file = new File([blob], `post_${Date.now()}.txt`, { type: "text/plain" });

                console.log("📤 Uploading file:", file);

                // Correct API usage for Fleek Storage
                const uploadResult = await fleekStorage.storage.uploadFile({
                    bucket: "aideazz-blog",
                    projectId: projectId, // Ensure project ID is passed
                    key: `ai_posts/${file.name}`,
                    file: file,
                    contentType: "text/plain"
                });

                console.log("✅ Upload Result:", uploadResult);

                if (uploadResult && uploadResult.cid) {
                    return uploadResult.cid;
                } else {
                    throw new Error("❌ Upload failed. No CID returned.");
                }
            } catch (error) {
                console.error("❌ Error uploading to Fleek:", error);
                document.getElementById("postStatus").innerText = "❌ Failed to upload post.";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("submitPost").addEventListener("click", async () => {
                const postContent = document.getElementById("postContent").value;
                if (!postContent) {
                    alert("Please write something before submitting.");
                    return;
                }

                document.getElementById("postStatus").innerText = "Uploading to Fleek IPFS...";
                const cid = await uploadToFleek(postContent);
                
                if (cid) {
                    document.getElementById("postStatus").innerHTML = `✅ Post uploaded! <a href="https://ipfs.io/ipfs/${cid}" target="_blank">View on IPFS</a>`;
                    const postDiv = document.createElement("div");
                    postDiv.innerHTML = `<p><a href="https://ipfs.io/ipfs/${cid}" target="_blank">${postContent}</a></p>`;
                    document.getElementById("posts").prepend(postDiv);
                }
            });
        });
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .button {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 15px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            background-color: #007bff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #0056b3;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Blog - AIdeazz</h1>
        <p>Submit your AI-related posts and store them on IPFS.</p>
        
        <textarea id="postContent" placeholder="Write your AI idea here..."></textarea>
        <button class="button" id="submitPost">Submit Post</button>
        <p id="postStatus"></p>

        <h2>Recent Posts</h2>
        <div id="posts"></div>
    </div>
</body>
</html>
