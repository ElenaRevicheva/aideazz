<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - AIdeazz</title>
    <script src="https://cdn.jsdelivr.net/npm/@fleek-platform/sdk@latest/browser.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .button {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 15px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            background-color: #007bff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #0056b3;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Blog - AIdeazz</h1>
        <p>Submit your AI-related posts and store them on IPFS.</p>
        
        <textarea id="postContent" placeholder="Write your AI idea here..."></textarea>
        <button class="button" id="submitPost">Submit Post</button>
        <p id="postStatus"></p>

        <h2>Recent Posts</h2>
        <div id="posts"></div>
    </div>

    <script>
        const clientId = "client__3Wvtty7Aa7KgxsqC0NO";
        const apiUrl = "https://platform.fleek.co/storage/v1/upload";

        async function uploadToFleek(content) {
            console.log("🚀 Initializing Upload to Fleek...");
            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${clientId}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        fileName: "post.txt",
                        content: content
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("✅ Upload Successful:", data);
                return data.cid;
            } catch (error) {
                console.error("❌ Error uploading to Fleek:", error);
                document.getElementById("postStatus").innerText = "❌ Failed to upload post. Check console for details.";
            }
        }

        document.getElementById("submitPost").addEventListener("click", async () => {
            const postContent = document.getElementById("postContent").value;
            if (!postContent) {
                alert("Please write something before submitting.");
                return;
            }
            document.getElementById("postStatus").innerText = "Uploading to Fleek...";
            try {
                const cid = await uploadToFleek(postContent);
                if (cid) {
                    document.getElementById("postStatus").innerHTML = `✅ Post uploaded! View it on <a href="https://ipfs.io/ipfs/${cid}" target="_blank">IPFS</a>`;
                    
                    const postDiv = document.createElement("div");
                    postDiv.innerHTML = `<p><a href="https://ipfs.io/ipfs/${cid}" target="_blank">${postContent}</a></p>`;
                    document.getElementById("posts").prepend(postDiv);
                }
            } catch (error) {
                console.error("❌ Error uploading to Fleek:", error);
                document.getElementById("postStatus").innerText = "❌ Failed to upload post.";
            }
        });
    </script>
</body>
</html>
